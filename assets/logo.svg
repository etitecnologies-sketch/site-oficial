<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aaff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="10" y="55" font-family="Orbitron, sans-serif" font-size="40" font-weight="900" fill="url(#grad)" filter="url(#glow)">ETI</text>
  <text x="90" y="55" font-family="Rajdhani, sans-serif" font-size="18" font-weight="600" fill="#c8e8ff" letter-spacing="2">TECNOLOGIES</text>
  <path d="M10 65 L190 65" stroke="#00ffcc" stroke-width="1" opacity="0.5" />
</svg>
